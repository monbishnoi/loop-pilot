<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafbfc" rx="12"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="760" height="50" fill="url(#headerGrad)" rx="8"/>
  <text x="40" y="51" fill="white" font-size="18" font-weight="600">Pre-Loop: Prediction &amp; Guidance</text>
  <text x="680" y="51" fill="#8892b0" font-size="12">LOOP PILOT</text>

  <!-- User Task -->
  <rect x="40" y="100" width="160" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="120" y="127" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">User Task</text>
  <text x="120" y="145" text-anchor="middle" font-size="11" fill="#1976d2">"Check my calendar"</text>

  <!-- Arrow 1 -->
  <path d="M 200 130 L 250 130" stroke="#424242" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#424242"/></marker></defs>

  <!-- Loop Pilot Box -->
  <rect x="260" y="85" width="280" height="200" fill="url(#boxGrad)" stroke="#6c757d" stroke-width="1" rx="10" filter="url(#shadow)"/>
  <rect x="260" y="85" width="280" height="32" fill="#495057" rx="10"/>
  <rect x="260" y="105" width="280" height="12" fill="#495057"/>
  <text x="400" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="white">Loop Pilot</text>

  <!-- Internal steps -->
  <rect x="280" y="130" width="240" height="30" fill="#fff3e0" stroke="#f57c00" stroke-width="1" rx="5"/>
  <text x="400" y="150" text-anchor="middle" font-size="11" fill="#e65100">① Embed task description</text>

  <rect x="280" y="170" width="240" height="30" fill="#fff3e0" stroke="#f57c00" stroke-width="1" rx="5"/>
  <text x="400" y="190" text-anchor="middle" font-size="11" fill="#e65100">② KNN: find 5 similar past episodes</text>

  <rect x="280" y="210" width="240" height="30" fill="#fff3e0" stroke="#f57c00" stroke-width="1" rx="5"/>
  <text x="400" y="230" text-anchor="middle" font-size="11" fill="#e65100">③ Predict budget from neighbors</text>

  <rect x="280" y="250" width="240" height="30" fill="#fff3e0" stroke="#f57c00" stroke-width="1" rx="5"/>
  <text x="400" y="270" text-anchor="middle" font-size="11" fill="#e65100">④ Generate prompt guidance</text>

  <!-- Arrow 2 -->
  <path d="M 540 185 L 590 185" stroke="#424242" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Guidance Output -->
  <rect x="600" y="100" width="160" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="680" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">Guidance Block</text>
  <text x="680" y="148" text-anchor="middle" font-size="10" fill="#388e3c">Budget: 3 calls</text>
  <text x="680" y="163" text-anchor="middle" font-size="10" fill="#388e3c">Tools: calendar, bash</text>

  <!-- Arrow to Agent -->
  <path d="M 680 180 L 680 310" stroke="#424242" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="690" y="250" font-size="10" fill="#616161">injected into</text>
  <text x="690" y="263" font-size="10" fill="#616161">system prompt</text>

  <!-- Agent Loop -->
  <rect x="560" y="320" width="200" height="60" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="660" y="347" text-anchor="middle" font-size="13" font-weight="600" fill="#4527a0">Agent Loop</text>
  <text x="660" y="365" text-anchor="middle" font-size="11" fill="#5e35b1">Model runs normally</text>

  <!-- Arrow from Agent to Record -->
  <path d="M 560 365 L 400 365 L 400 330" stroke="#424242" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Record Episode -->
  <rect x="320" y="300" width="160" height="50" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="400" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">record_episode</text>
  <text x="400" y="338" text-anchor="middle" font-size="10" fill="#c62828">Stored for future KNN</text>

  <!-- Feedback arrow -->
  <path d="M 320 325 L 260 265" stroke="#c62828" stroke-width="1" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="250" y="310" font-size="9" fill="#c62828" transform="rotate(-35, 270, 300)">feeds back</text>

  <!-- Legend -->
  <rect x="40" y="420" width="720" height="60" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1" rx="6"/>
  <text x="60" y="445" font-size="11" font-weight="600" fill="#424242">Philosophy:</text>
  <text x="140" y="445" font-size="11" fill="#616161">Inform, then trust. The model receives guidance as context — not as a hard limit.</text>
  <text x="60" y="465" font-size="11" font-weight="600" fill="#424242">Principle:</text>
  <text x="140" y="465" font-size="11" fill="#616161">Loop Pilot is advisory only. The harness's safety cap remains unchanged as a backstop.</text>
</svg>
